server.port=8080
spring.application.name=api-gateway

spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webmvc.routes[0].id=usuario-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USUARIO-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.server.webmvc.routes[1].id=proyecto-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://PROYECTO-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/proyectos/**

spring.cloud.gateway.server.webmvc.routes[2].id=tarea-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://TAREA-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/tareas/**

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always