server.port=8083
spring.application.name=tarea-service

spring.datasource.url=jdbc:mysql://localhost:3306/tarea_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

mensaje=Tarea Service usando Config Server correctamente
resilience4j.retry.instances.tareaDetalle.max-attempts=3
resilience4j.retry.instances.tareaDetalle.wait-duration=1s

resilience4j.circuitbreaker.instances.tareaDetalle.sliding-window-size=5
resilience4j.circuitbreaker.instances.tareaDetalle.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.tareaDetalle.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tareaDetalle.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.tareaDetalle.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.tareaDetalle.automatic-transition-from-open-to-half-open-enabled=true